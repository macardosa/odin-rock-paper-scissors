<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock-paper-scissors game</title>
    <script src="scripts.js" type="module"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="layout-round">
      <div class="scores">
        <div class="human-score">Your score: 0</div>
        <div class="computer-score">Computer: 0</div>
      </div>

      <h1 class="round-number-box">ROUND #1</h1>

      <div class="user-choice-wrapper">
        <div class="heading">Select your choice</div>
        <div class="choices">
          <div class="choice-button" value="rock">
            <div class="emoji">✊</div>
            <div>ROCK</div>
          </div>
          <div class="choice-button" value="scissors">
            <div class="emoji">✌️</div>
            <div>SCISSORS</div>
          </div>
          <div class="choice-button" value="paper">
            <div class="emoji">✋</div>
            <div>PAPER</div>
          </div>
        </div>
        <div class="log-area">Good Luck!</div>
      </div>
    </div>
  </body>
</html>
